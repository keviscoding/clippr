<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clippr — Get paid to clip</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="src/config.js"></script>
<style>
  html, body { margin:0; padding:0; font-family: Geist, sans-serif; }
  body { background: #0A0A0A; color: #FAFAF7; }
  body[data-world="light"] { background: #FAFAF7; color: #0A0A0A; }
  * { box-sizing: border-box; }
  .surface-wrap { animation: surfaceIn 320ms cubic-bezier(0.2,0.8,0.2,1); }
  @keyframes surfaceIn { from { opacity:0; transform: translateY(6px) } to { opacity:1; transform:none } }
  .splash { position:fixed; inset:0; display:grid; place-items:center; background:#0A0A0A; color:#FAFAF7; z-index:1000; font-family:Geist,sans-serif; }
</style>
</head>
<body class="payload-dark" data-world="dark">
<div id="root"><div class="splash"><div style="text-align:center"><div style="font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:0.1em;opacity:0.6">CLIPPR</div><div style="margin-top:8px;font-size:14px;opacity:0.55">Loading…</div></div></div></div>

<!-- Shared primitives -->
<script type="text/babel" src="src/shared.jsx"></script>
<script type="text/babel" src="src/api.jsx"></script>
<script type="text/babel" src="src/SurfaceDock.jsx"></script>

<!-- Marketing surface components -->
<script type="text/babel" src="src/marketing/Nav.jsx"></script>
<script type="text/babel" src="src/marketing/Hero.jsx"></script>
<script type="text/babel" src="src/marketing/PayoutTicker.jsx"></script>
<script type="text/babel" src="src/marketing/HowItWorks.jsx"></script>
<script type="text/babel" src="src/marketing/CampaignGrid.jsx"></script>
<script type="text/babel" src="src/marketing/FounderVideo.jsx"></script>
<script type="text/babel" src="src/marketing/ProofSection.jsx"></script>
<script type="text/babel" src="src/marketing/Faq.jsx"></script>
<script type="text/babel" src="src/marketing/CtaFooter.jsx"></script>
<script type="text/babel" src="src/marketing/AuthModal.jsx"></script>

<!-- Clipper surface components -->
<script type="text/babel" src="src/clipper/Sidebar.jsx"></script>
<script type="text/babel" src="src/clipper/EarningsOverview.jsx"></script>
<script type="text/babel" src="src/clipper/CampaignsList.jsx"></script>
<script type="text/babel" src="src/clipper/BriefDetail.jsx"></script>
<script type="text/babel" src="src/clipper/PayoutsPanel.jsx"></script>
<script type="text/babel" src="src/clipper/SubmitClipModal.jsx"></script>
<script type="text/babel" src="src/clipper/SettingsPanel.jsx"></script>

<!-- Admin surface components -->
<script type="text/babel" src="src/admin/AdminSidebar.jsx"></script>
<script type="text/babel" src="src/admin/AdminOverview.jsx"></script>
<script type="text/babel" src="src/admin/ReviewQueue.jsx"></script>
<script type="text/babel" src="src/admin/CampaignEditor.jsx"></script>
<script type="text/babel" src="src/admin/PayoutsAdmin.jsx"></script>

<script type="text/babel">
  const { useState, useEffect, useCallback } = React;

  // ---------- Setup gate ----------
  function SetupNotice(){
    return (
      <div style={{minHeight:"100vh",display:"grid",placeItems:"center",background:"#0A0A0A",color:"#FAFAF7",padding:32}}>
        <div style={{maxWidth:560,padding:32,background:"#121212",border:"1px solid rgba(255,255,255,0.08)",borderRadius:18,boxShadow:"0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06)"}}>
          <div style={{fontFamily:"Geist Mono,monospace",fontSize:11,letterSpacing:"0.08em",color:"rgba(250,250,247,0.55)"}}>SETUP REQUIRED</div>
          <h1 style={{fontSize:28,fontWeight:600,letterSpacing:"-0.02em",margin:"8px 0 14px"}}>Clippr backend not configured</h1>
          <p style={{fontSize:15,lineHeight:1.6,color:"rgba(250,250,247,0.75)",margin:"0 0 20px"}}>
            To finish setup, create a free Supabase project, run <code style={{background:"#1E1E1E",padding:"2px 6px",borderRadius:4,fontFamily:"Geist Mono,monospace",fontSize:13}}>supabase/schema.sql</code>, and paste your project URL + anon key into <code style={{background:"#1E1E1E",padding:"2px 6px",borderRadius:4,fontFamily:"Geist Mono,monospace",fontSize:13}}>project/src/config.js</code>. Then push to redeploy.
          </p>
          <p style={{fontSize:14,lineHeight:1.6,color:"rgba(250,250,247,0.55)",margin:0}}>
            See <code style={{background:"#1E1E1E",padding:"2px 6px",borderRadius:4,fontFamily:"Geist Mono,monospace",fontSize:13}}>SETUP.md</code> in the repo for step-by-step instructions.
          </p>
        </div>
      </div>
    );
  }

  // ---------- Marketing surface ----------
  function MarketingApp({ onAuth }){
    const [auth, setAuth] = useState({open:false, mode:"signup"});
    const openAuth = (mode) => setAuth({open:true, mode});
    const closeAuth = () => setAuth(a => ({...a, open:false}));
    const doSwitch = () => setAuth(a => ({...a, mode: a.mode==="signup"?"login":"signup"}));
    return (
      <div style={{background:"#0A0A0A",color:"#FAFAF7",minHeight:"100vh"}}>
        <Nav onJoin={()=>openAuth("signup")} onLogin={()=>openAuth("login")}/>
        <Hero onJoin={()=>openAuth("signup")} variant="clip-post-paid"/>
        <PayoutTicker/>
        <HowItWorks/>
        <CampaignGrid onJoin={()=>openAuth("signup")}/>
        <FounderVideo/>
        <ProofSection/>
        <Faq/>
        <CtaFooter onJoin={()=>openAuth("signup")}/>
        <AuthModal
          open={auth.open} mode={auth.mode}
          onClose={closeAuth}
          onSwitch={doSwitch}
          onSuccess={()=>{ closeAuth(); onAuth && onAuth(); }}
        />
      </div>
    );
  }

  // ---------- Clipper surface ----------
  function ClipperApp({ profile, onSignOut }){
    const [view, setView] = useState("overview");
    const [submitOpen, setSubmitOpen] = useState(false);
    const [briefOpen, setBriefOpen] = useState(false);
    const [activeCampaign, setActiveCampaign] = useState(null);
    const [refreshKey, setRefreshKey] = useState(0);
    const bumpRefresh = () => setRefreshKey(k => k + 1);

    const onOpenBrief = (camp) => { setActiveCampaign(camp); setBriefOpen(true); };
    const onSubmitFor  = (camp) => { setActiveCampaign(camp || null); setSubmitOpen(true); };

    if (briefOpen) {
      return (
        <div style={{display:"grid",gridTemplateColumns:"240px 1fr",minHeight:"100vh",background:"#FAFAF7",color:"#0A0A0A"}}>
          <Sidebar view={view} setView={(v)=>{setBriefOpen(false); setView(v);}} profile={profile} onSignOut={onSignOut}/>
          <div>
            <BriefDetail campaign={activeCampaign} onBack={()=>setBriefOpen(false)} onSubmit={()=>{setSubmitOpen(true);}}/>
          </div>
          <SubmitClipModal open={submitOpen} onClose={()=>setSubmitOpen(false)} campaign={activeCampaign} onSubmitted={()=>{setSubmitOpen(false); bumpRefresh();}}/>
        </div>
      );
    }
    return (
      <div style={{display:"grid",gridTemplateColumns:"240px 1fr",minHeight:"100vh",background:"#FAFAF7",color:"#0A0A0A"}}>
        <Sidebar view={view} setView={setView} profile={profile} onSignOut={onSignOut}/>
        <div>
          <Topbar onSubmit={()=>onSubmitFor(null)} profile={profile}/>
          {view==="overview"  && <EarningsOverview key={"o"+refreshKey} onSubmit={()=>onSubmitFor(null)}/>}
          {view==="campaigns" && <CampaignsList   key={"c"+refreshKey} onSubmit={onSubmitFor} onOpenBrief={onOpenBrief}/>}
          {view==="clips"     && <EarningsOverview key={"cl"+refreshKey} onSubmit={()=>onSubmitFor(null)}/>}
          {view==="payouts"   && <PayoutsPanel    key={"p"+refreshKey} profile={profile} onChanged={bumpRefresh}/>}
          {view==="settings"  && <SettingsPanel   profile={profile} onSaved={()=>{}} />}
        </div>
        <SubmitClipModal open={submitOpen} onClose={()=>setSubmitOpen(false)} campaign={activeCampaign} onSubmitted={()=>{setSubmitOpen(false); bumpRefresh();}}/>
      </div>
    );
  }

  // ---------- Admin surface ----------
  function AdminTopbar({ stats, profile }){
    const display = profile && profile.display_name ? profile.display_name : "admin";
    const head = stats
      ? `${stats.pendingClipsCount} clips waiting · ${stats.pendingPayoutsCount} payouts (${money(stats.pendingPayoutAmount)}) ready`
      : "Loading…";
    return (
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 28px",borderBottom:"1px solid #E8E6DF",background:"rgba(250,250,247,0.8)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:10}}>
        <div>
          <div style={{fontFamily:"Geist Mono,monospace",fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em",color:"#6E6D66"}}>WELCOME BACK · {display.toUpperCase()}</div>
          <div style={{fontSize:18,fontWeight:600,letterSpacing:"-0.015em",marginTop:2}}>{head}</div>
        </div>
        <div style={{width:36,height:36,borderRadius:999,background:"linear-gradient(135deg,#D4FF3A,#4ADE80)",display:"grid",placeItems:"center",fontWeight:700,color:"#0A0A0A"}}>{(display[0]||"K").toUpperCase()}</div>
      </div>
    );
  }
  function money(n){ const x = Number(n||0); return "$" + x.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function AdminApp({ profile, onSignOut }){
    const [view, setView] = useState("overview");
    const [stats, setStats] = useState(null);
    const [refreshKey, setRefreshKey] = useState(0);
    const bumpRefresh = () => setRefreshKey(k => k + 1);

    useEffect(() => {
      let mounted = true;
      api.getAdminStats().then(r => { if (mounted && !r.error) setStats(r.data); });
      return () => { mounted = false; };
    }, [refreshKey]);

    return (
      <div style={{display:"grid",gridTemplateColumns:"240px 1fr",minHeight:"100vh",background:"#FAFAF7",color:"#0A0A0A"}}>
        <AdminSidebar view={view} setView={setView} profile={profile} onSignOut={onSignOut}/>
        <div>
          <AdminTopbar stats={stats} profile={profile}/>
          {view==="overview"  && <AdminOverview  key={"o"+refreshKey} stats={stats}/>}
          {view==="review"    && <ReviewQueue    key={"r"+refreshKey} onChanged={bumpRefresh}/>}
          {view==="campaigns" && <CampaignEditor key={"c"+refreshKey} onChanged={bumpRefresh}/>}
          {view==="payouts"   && <PayoutsAdmin   key={"p"+refreshKey} onChanged={bumpRefresh}/>}
        </div>
      </div>
    );
  }

  // ---------- Root ----------
  function App(){
    const [bootState, setBootState] = useState("loading"); // loading | ready
    const [session, setSession] = useState(null);
    const [profile, setProfile] = useState(null);
    const [previewSurface, setPreviewSurface] = useState(null); // admin can preview marketing/clipper

    const refreshProfile = useCallback(async () => {
      const r = await api.getMyProfile();
      if (!r.error) setProfile(r.data);
    }, []);

    useEffect(() => {
      if (!api.isConfigured) { setBootState("ready"); return; }
      let unsub = () => {};
      (async () => {
        const r = await api.getSession();
        setSession(r.data || null);
        if (r.data) await refreshProfile();
        setBootState("ready");
        unsub = api.onAuthStateChange(async (s) => {
          setSession(s);
          if (s) await refreshProfile(); else setProfile(null);
        });
      })();
      return () => unsub();
    }, [refreshProfile]);

    const surfaceForUser = !session ? "marketing"
      : (profile && profile.is_admin) ? "admin" : "clipper";
    const surface = previewSurface || surfaceForUser;

    // Mirror body world
    useEffect(()=> {
      document.body.dataset.world = surface==="marketing" ? "dark" : "light";
      document.body.className = surface==="marketing" ? "payload-dark" : "";
    }, [surface]);

    const handleSignOut = async () => {
      await api.signOut();
      setPreviewSurface(null);
    };

    if (!api.isConfigured) return <SetupNotice/>;
    if (bootState === "loading") return null; // splash already painted

    return (
      <div>
        {profile && profile.is_admin && (
          <SurfaceDock surface={surface} setSurface={(s)=> s===surfaceForUser ? setPreviewSurface(null) : setPreviewSurface(s)}/>
        )}
        <div key={surface} className="surface-wrap">
          {surface==="marketing" && <MarketingApp onAuth={()=>{ /* auth state will flip surface automatically */ }}/>}
          {surface==="clipper"   && <ClipperApp profile={profile} onSignOut={handleSignOut}/>}
          {surface==="admin"     && <AdminApp   profile={profile} onSignOut={handleSignOut}/>}
        </div>
      </div>
    );
  }

  // Replace splash once boot finishes (App returns null while loading; first paint overwrites the splash div)
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
